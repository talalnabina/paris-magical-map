<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1B2C6A"/>
<title>Magical Paris Map — A Disneyland Paris Inspired Guide</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Google Fonts: Disney-inspired -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mr+Dafoe&family=Quicksand:wght@400;500;600;700&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root{
    /* Disneyland Paris brand palette — twilight castle edition */
    --dlp-royal:        #1B2C6A;   /* castle navy / royal blue */
    --dlp-royal-deep:   #0E1A47;
    --dlp-purple:       #6B3FA0;   /* Maleficent / twilight purple */
    --dlp-purple-deep:  #3D1F66;   /* deep night purple */
    --dlp-purple-soft:  #9B6FCB;   /* light lilac for accents */
    --dlp-magenta:      #E6308A;   /* Minnie pink */
    --dlp-pink:         #F8C8DC;   /* castle pink */
    --dlp-gold:         #D4AF6F;   /* softer champagne gold (was bright yellow) */
    --dlp-gold-deep:    #B08F4E;
    --dlp-gold-light:   #E8CEA0;
    --dlp-sky:          #BFE3F5;
    --dlp-cream:        #FBF6EE;   /* warm parchment */
    --dlp-white:        #FFFFFF;
    --shadow-soft:      0 6px 24px rgba(61,31,102,.20);
    --shadow-pop:       0 14px 44px rgba(61,31,102,.38);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:'Quicksand', system-ui, sans-serif;color:var(--dlp-royal-deep);background:var(--dlp-cream);}

  /* ---------- HEADER ---------- */
  header.app{
    position:relative;
    /* Castle-at-twilight gradient: midnight navy → royal purple → magenta glow */
    background:
      radial-gradient(ellipse at 85% 110%, rgba(230,48,138,.35) 0%, transparent 55%),
      radial-gradient(ellipse at 15% -10%, rgba(155,111,203,.30) 0%, transparent 50%),
      linear-gradient(135deg,
        var(--dlp-royal-deep) 0%,
        var(--dlp-purple-deep) 35%,
        var(--dlp-purple) 70%,
        #4a2a8a 100%);
    color:var(--dlp-white);
    padding:18px 28px 16px;
    box-shadow:var(--shadow-soft);
    z-index:1500;
  }
  header.app::before{
    /* sparkle pattern — gold, lilac, pink and white twinkles across the night sky */
    content:"";
    position:absolute; inset:0;
    clip-path: inset(0);
    background-image:
      radial-gradient(circle at 12% 30%, rgba(255,255,255,.90) 0 1.5px, transparent 2px),
      radial-gradient(circle at 25% 75%, rgba(212,175,111,.85) 0 1.8px, transparent 2.2px),
      radial-gradient(circle at 42% 20%, rgba(232,206,160,.85) 0 1.2px, transparent 1.6px),
      radial-gradient(circle at 60% 60%, rgba(155,111,203,.75) 0 1.6px, transparent 2.2px),
      radial-gradient(circle at 78% 35%, rgba(255,255,255,.85) 0 1.4px, transparent 1.8px),
      radial-gradient(circle at 88% 80%, rgba(230,48,138,.70) 0 1.6px, transparent 2.2px),
      radial-gradient(circle at 6%  85%, rgba(255,255,255,.75) 0 1.2px, transparent 1.8px),
      radial-gradient(circle at 50% 92%, rgba(212,175,111,.7) 0 1.4px, transparent 2px),
      radial-gradient(circle at 33% 50%, rgba(155,111,203,.55) 0 1.3px, transparent 1.8px),
      radial-gradient(circle at 70% 15%, rgba(248,200,220,.7) 0 1.3px, transparent 1.8px);
    pointer-events:none;
    opacity:.92;
  }
  .title-row{
    display:flex; align-items:center; gap:14px; position:relative; z-index:2;
  }
  .castle{
    font-size:34px;
    filter: drop-shadow(0 2px 0 rgba(0,0,0,.3));
  }
  h1{
    font-family:'Cinzel', serif;
    font-weight:700;
    margin:0;
    font-size:26px;
    letter-spacing:.5px;
  }
  h1 .magic{
    font-family:'Mr Dafoe', cursive;
    /* Lilac-to-champagne magical gradient on the script word */
    background: linear-gradient(135deg, #E8CEA0 0%, #F8C8DC 45%, #9B6FCB 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: var(--dlp-purple-soft); /* fallback */
    font-weight:400;
    font-size:38px;
    margin-right:8px;
    filter: drop-shadow(0 0 12px rgba(155,111,203,.55));
  }
  .subtitle{
    position:relative; z-index:2;
    font-size:13px; opacity:.9; margin-top:4px; padding-left:48px;
    letter-spacing:.3px;
  }

  /* ---------- CONTROLS ---------- */
  .controls{
    position:relative; z-index:3;
    margin-top:14px;
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  }
  .search-wrap{
    position:relative;
    flex:1; min-width:260px; max-width:420px;
  }
  .search-wrap input{
    width:100%;
    padding:11px 14px 11px 40px;
    border-radius:24px;
    border:2px solid var(--dlp-gold);
    background:var(--dlp-white);
    font-family:inherit;
    font-size:14px;
    color:var(--dlp-royal-deep);
    box-shadow: 0 4px 18px rgba(61,31,102,.22);
    outline:none;
  }
  .search-wrap input:focus{
    border-color:var(--dlp-purple);
    box-shadow: 0 0 0 4px rgba(155,111,203,.25), 0 4px 18px rgba(61,31,102,.30);
  }
  .search-wrap .icon{
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    font-size:16px; color:var(--dlp-purple); pointer-events:none;
  }
  .suggestions{
    position:absolute; left:0; right:0; top:calc(100% + 6px);
    background:var(--dlp-white);
    border-radius:14px;
    box-shadow:var(--shadow-pop);
    overflow:hidden;
    max-height:60vh; overflow-y:auto;
    display:none;
    border:1px solid rgba(27,44,106,.08);
    z-index:5000;
  }
  .sugg-group{
    padding:6px 14px 4px;
    font-size:10px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1.2px;
    color:var(--dlp-purple-deep);
    background: linear-gradient(90deg, rgba(155,111,203,.18), rgba(212,175,111,.10));
    position:sticky; top:0; z-index:2;
    border-bottom:1px solid rgba(155,111,203,.30);
  }
  .sugg-empty{
    padding:18px 14px; text-align:center; color:#888; font-size:13px;
  }
  .suggestions.show{display:block}
  .suggestion{
    padding:10px 14px;
    display:flex; align-items:center; gap:10px;
    cursor:pointer;
    border-bottom:1px solid rgba(27,44,106,.06);
    color:var(--dlp-royal-deep);
    transition: background .15s ease;
  }
  .suggestion:hover, .suggestion.active{
    background: linear-gradient(90deg, rgba(212,175,111,.22), rgba(155,111,203,.18));
  }
  .suggestion:last-child{border-bottom:none}
  .suggestion .pin{
    width:24px;height:24px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    color:white; font-size:12px; flex-shrink:0;
  }
  .suggestion .meta{
    font-size:11px; opacity:.7; margin-left:auto;
  }

  .category-bar{
    display:flex; flex-wrap:wrap; gap:8px;
  }
  .cat-btn{
    background: rgba(255,255,255,.12);
    color:var(--dlp-white);
    border:1.5px solid rgba(255,255,255,.45);
    padding:8px 14px;
    border-radius:22px;
    font-family:inherit;
    font-size:13px; font-weight:600;
    cursor:pointer;
    display:inline-flex; align-items:center; gap:6px;
    transition: all .2s ease;
    backdrop-filter: blur(4px);
  }
  @media (hover: hover){
    .cat-btn:hover{
      background: rgba(255,255,255,.22);
      transform: translateY(-1px);
    }
  }
  .cat-btn.active{
    background: linear-gradient(135deg, var(--dlp-gold-light) 0%, var(--dlp-gold) 100%);
    color:var(--dlp-royal-deep);
    border-color:var(--dlp-gold-deep);
    box-shadow: 0 0 0 3px rgba(212,175,111,.30), 0 4px 12px rgba(61,31,102,.25);
  }
  .cat-btn .dot{
    width:10px;height:10px;border-radius:50%;
    display:inline-block; background:white;
  }

  /* ---------- MAP ---------- */
  .map-wrap{
    position:relative;
    /* dynamic viewport height - works correctly on iOS Safari */
    height: calc(100dvh - var(--header-h, 184px));
    min-height: 360px;
  }
  #map{
    height: 100%;
    width:100%;
    border-top: 3px solid var(--dlp-gold);
    /* Prevent iOS overscroll bouncing on the map */
    touch-action: pan-x pan-y;
  }

  /* Custom marker icons */
  .pin-marker{
    width:34px;height:34px;
    background:var(--dlp-magenta);
    border:3px solid var(--dlp-white);
    border-radius:50% 50% 50% 0;
    transform: rotate(-45deg);
    box-shadow: 0 4px 14px rgba(61,31,102,.45);
    display:flex; align-items:center; justify-content:center;
    color:white; font-size:15px;
    transition: transform .2s ease;
  }
  .pin-marker span{ transform: rotate(45deg); }
  .pin-marker:hover{
    transform: rotate(-45deg) scale(1.15);
  }

  /* Popup styling */
  .leaflet-popup-content-wrapper{
    border-radius:16px !important;
    padding:0 !important;
    overflow:hidden;
    box-shadow: 0 14px 44px rgba(61,31,102,.40) !important;
    border:3px solid var(--dlp-gold);
  }
  .leaflet-popup-content{
    margin:0 !important;
    width: 300px !important;
    font-family:'Quicksand', sans-serif;
  }
  .leaflet-popup-tip{
    background:var(--dlp-purple) !important;
  }
  .pop-header{
    /* Twilight castle gradient: navy → purple → magenta hint */
    background:
      radial-gradient(circle at 90% 100%, rgba(230,48,138,.35), transparent 60%),
      linear-gradient(135deg, var(--dlp-royal-deep) 0%, var(--dlp-purple-deep) 55%, var(--dlp-purple) 100%);
    color:white;
    padding:12px 16px;
    position:relative;
  }
  .pop-header::after{
    content:"";
    position:absolute; left:0; right:0; bottom:-1px; height:6px;
    background-image: radial-gradient(circle at 8px 0, var(--dlp-purple) 5px, transparent 6px);
    background-size: 16px 6px;
    background-position: 0 100%;
    background-repeat: repeat-x;
  }
  .pop-cat{
    display:inline-block;
    font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase;
    padding:3px 9px; border-radius:10px;
    background: linear-gradient(135deg, var(--dlp-gold-light), var(--dlp-gold));
    color: var(--dlp-royal-deep);
    margin-bottom:6px;
    box-shadow: 0 1px 3px rgba(61,31,102,.25);
  }
  .pop-title{
    font-family:'Cinzel', serif;
    font-size:17px; font-weight:700; line-height:1.2;
    margin:0;
  }
  .pop-body{
    padding:14px 16px;
    background:var(--dlp-cream);
  }
  .pop-desc{
    font-size:13px; line-height:1.45; color:#333; margin:0 0 10px;
  }
  .pop-rating{
    display:flex; align-items:center; gap:8px;
    padding: 7px 11px;
    margin: 0 0 8px;
    background: linear-gradient(90deg, rgba(212,175,111,.22), rgba(212,175,111,.05));
    border: 1px solid rgba(212,175,111,.35);
    border-radius:10px;
    font-size:13px;
  }
  .pop-rating .stars{
    font-weight:700;
    color: var(--dlp-gold-deep);
    display:inline-flex; align-items:center; gap:4px;
  }
  .pop-rating .stars svg{ width:14px; height:14px; }
  .pop-rating .reviews{
    font-size:11px;
    color:#666;
  }
  .pop-rating .live-hint{
    margin-left:auto;
    font-size:10px;
    opacity:.6;
    font-style:italic;
  }
  .pop-address{
    display:flex; align-items:flex-start; gap:6px;
    font-size:12px; color:#555; line-height:1.4;
    margin: 0 0 10px;
    padding-left:2px;
  }
  .pop-address::before{
    content:"📍";
    font-size:12px;
    flex-shrink:0;
  }
  .branches{
    background:white;
    border-radius:10px;
    padding:8px 10px;
    margin:8px 0 12px;
    border:1px solid rgba(27,44,106,.08);
  }
  .branches strong{
    display:block; font-size:11px; text-transform:uppercase; letter-spacing:.8px;
    color:var(--dlp-magenta); margin-bottom:4px;
  }
  .branches ul{margin:0; padding-left:18px; font-size:12px; color:#444}
  .branches li{ margin:2px 0 }
  .pop-links{
    display:flex; gap:8px; flex-wrap:wrap;
  }
  .pop-links a{
    flex:1;
    text-align:center;
    text-decoration:none;
    font-size:12px; font-weight:700;
    padding:8px 10px;
    border-radius:20px;
    transition: transform .15s ease, box-shadow .15s ease;
    white-space:nowrap;
    min-width:120px;
  }
  .pop-links a.gm{
    background: linear-gradient(135deg, var(--dlp-magenta), #c41e76);
    color:white;
  }
  .pop-links a.ta{
    background: linear-gradient(135deg, var(--dlp-purple), var(--dlp-purple-deep));
    color:white;
  }
  .pop-links a:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,.18);
  }

  /* ---------- LOCATE-ME FLOATING BUTTON ---------- */
  .locate-fab{
    position:absolute;
    right:14px;
    bottom:22px;
    width:54px; height:54px;
    border-radius:50%;
    border:3px solid var(--dlp-white);
    background: linear-gradient(135deg, var(--dlp-purple) 0%, var(--dlp-purple-deep) 100%);
    color:white;
    font-size:22px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow: 0 8px 22px rgba(61,31,102,.45);
    z-index:1100;
    transition: transform .15s ease, box-shadow .2s ease, background .3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .locate-fab:hover{
    transform: scale(1.06);
    box-shadow: 0 10px 28px rgba(61,31,102,.55);
  }
  .locate-fab:active{ transform: scale(.95); }
  .locate-fab.seeking{
    background: linear-gradient(135deg, var(--dlp-magenta), var(--dlp-purple));
    animation: locate-pulse 1.2s ease-in-out infinite;
  }
  .locate-fab.active{
    background: linear-gradient(135deg, var(--dlp-magenta), #c41e76);
  }
  @keyframes locate-pulse{
    0%, 100% { box-shadow: 0 8px 22px rgba(61,31,102,.45), 0 0 0 0 rgba(230,48,138,.55); }
    50%      { box-shadow: 0 8px 22px rgba(61,31,102,.45), 0 0 0 14px rgba(230,48,138,0); }
  }

  /* ---------- USER LOCATION MARKER ---------- */
  .user-marker{
    width:22px; height:22px;
    border-radius:50%;
    background: var(--dlp-magenta);
    border: 3px solid white;
    box-shadow: 0 0 0 2px var(--dlp-purple-deep), 0 4px 14px rgba(61,31,102,.5);
    position: relative;
  }
  .user-marker::before{
    /* outer pulse ring */
    content:"";
    position:absolute;
    inset:-6px;
    border-radius:50%;
    background: rgba(230,48,138,.35);
    animation: user-pulse 1.8s ease-out infinite;
  }
  @keyframes user-pulse{
    0%   { transform: scale(.6); opacity: .9; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  /* ---------- TOAST ---------- */
  .toast{
    position:fixed;
    left:50%; transform:translateX(-50%);
    bottom:24px;
    background: linear-gradient(135deg, var(--dlp-royal-deep), var(--dlp-purple-deep));
    color:white;
    padding:11px 18px;
    border-radius:24px;
    font-size:13px; font-weight:600;
    box-shadow: 0 12px 32px rgba(61,31,102,.50);
    border: 2px solid var(--dlp-gold);
    z-index:5500;
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease, transform .25s ease;
    max-width: calc(100vw - 32px);
    text-align:center;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(-4px);
  }
  @media (max-width: 680px){
    .locate-fab{ width:48px; height:48px; font-size:20px; bottom:18px; right:12px; }
    .toast{ font-size:12px; padding:9px 14px; bottom:80px; }
  }

  /* Legend / count badge */
  .stats{
    position:absolute; right:14px; top:14px;
    background: rgba(255,255,255,.96);
    padding:10px 14px;
    border-radius:14px;
    box-shadow: 0 8px 24px rgba(61,31,102,.28);
    z-index:1000;
    font-size:12px; color:var(--dlp-purple-deep);
    border:2px solid var(--dlp-gold);
  }
  .stats b{ color:var(--dlp-purple); font-size:16px; }

  /* ====================================
     RESPONSIVE — TABLET (≤ 900px)
     ==================================== */
  @media (max-width: 900px){
    header.app{ padding:14px 18px 12px; }
    .search-wrap{ max-width:none; }
  }

  /* ====================================
     RESPONSIVE — MOBILE (≤ 680px)
     ==================================== */
  @media (max-width: 680px){
    header.app{
      padding:12px 14px 10px;
    }
    .title-row{ gap:10px; }
    .castle{ font-size:28px; }
    h1{ font-size:17px; letter-spacing:.2px; }
    h1 .magic{ font-size:28px; margin-right:4px; }
    .subtitle{
      padding-left:0;
      font-size:11px;
      margin-top:2px;
      line-height:1.3;
    }
    .controls{
      margin-top:10px;
      gap:8px;
      flex-direction: column;
      align-items: stretch;
    }
    .search-wrap{
      width:100%; min-width:0; max-width:none;
      flex:1 1 auto;
    }
    .search-wrap input{
      padding:12px 14px 12px 38px;
      font-size:15px;          /* >=16px prevents iOS zoom-on-focus; 15 still mostly ok */
    }
    /* Category bar wrapper: horizontal scroll with a fade hint on the right edge */
    .category-bar-wrap{
      position: relative;
      margin: 0 -14px;        /* extend to header edges */
    }
    .category-bar-wrap::after{
      /* fade hint signalling more content to the right */
      content:"";
      position:absolute;
      top:0; right:0; bottom:0;
      width:28px;
      pointer-events:none;
      background: linear-gradient(to right,
        rgba(61,31,102,0) 0%,
        rgba(61,31,102,.55) 100%);
      opacity: var(--fade-right, 1);
      transition: opacity .2s ease;
    }
    .category-bar{
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      gap:6px;
      padding: 4px 28px 4px 14px;   /* extra right padding so last button isn't flush against the edge */
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;          /* prioritise horizontal touch */
      overscroll-behavior-x: contain; /* flicks don't bleed into page scroll */
      /* NOTE: no scroll-snap and no scroll-behavior:smooth — both interfere with native momentum on iOS/Android */
    }
    .category-bar::-webkit-scrollbar{ display:none; }
    .cat-btn{
      flex: 0 0 auto;
      padding:8px 12px;
      font-size:12px;
      transition: background .15s ease, box-shadow .15s ease, border-color .15s ease;
      /* On touch devices, drop the translateY hover so taps don't "stick" with a lifted state */
      transform: none !important;
    }

    /* Suggestions dropdown — taller, easier touch targets */
    .suggestions{
      max-height: 55vh;
      max-height: 55dvh;
      border-radius:12px;
    }
    .suggestion{
      padding:12px 14px;
      font-size:14px;
      min-height:44px;
      gap:12px;
    }
    .suggestion .pin{ width:28px; height:28px; font-size:13px; }
    .sugg-group{ font-size:11px; padding:8px 14px 6px; }

    /* Map */
    .map-wrap{ min-height:300px; }

    /* Stats badge — smaller, sits in corner without crowding */
    .stats{
      right:10px; top:10px;
      padding:6px 10px;
      font-size:11px;
      border-radius:10px;
    }
    .stats b{ font-size:14px; }

    /* Popups — fit on phone screens */
    .leaflet-popup-content{
      width: calc(100vw - 70px) !important;
      max-width: 320px !important;
    }
    .pop-header{ padding:10px 14px; }
    .pop-title{ font-size:15px; }
    .pop-cat{ font-size:9px; padding:2px 7px; }
    .pop-body{ padding:12px 14px; }
    .pop-desc{ font-size:12.5px; }
    .pop-links{ gap:6px; }
    .pop-links a{
      font-size:12px;
      padding:10px 8px;
      min-width:0;
      min-height:40px;
      display:flex; align-items:center; justify-content:center;
    }
    .branches ul{ font-size:11.5px; }

    /* Larger Leaflet zoom buttons for touch */
    .leaflet-touch .leaflet-bar a{
      width:36px !important;
      height:36px !important;
      line-height:34px !important;
      font-size:20px !important;
    }
  }

  /* ====================================
     RESPONSIVE — SMALL PHONE (≤ 380px)
     ==================================== */
  @media (max-width: 380px){
    h1{ font-size:15px; }
    h1 .magic{ font-size:24px; }
    .castle{ font-size:24px; }
    .subtitle{ display:none; }       /* save space on the smallest screens */
    .stats{ padding:5px 8px; font-size:10px; }
  }

  /* ====================================
     LANDSCAPE PHONE — compact header
     ==================================== */
  @media (max-height: 480px) and (orientation: landscape){
    header.app{ padding:8px 14px 8px; }
    .subtitle{ display:none; }
    .controls{ flex-direction: row; }
    .map-wrap{ min-height:240px; }
  }
</style>
</head>
<body>

<header class="app">
  <div class="title-row">

const map = L.map('map', { zoomControl:true, scrollWheelZoom:true }).setView([48.8606, 2.3376], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {

}).addTo(map);

const markers = [];

function makeIcon(cat){
  const meta = CAT_META[cat];
  const html = `<div class="pin-marker" style="background:${meta.color}"><span>${meta.emoji}</span></div>`;
  return L.divIcon({ html, className:'', iconSize:[34,34], iconAnchor:[17,34], popupAnchor:[0,-32] });
}

function formatReviews(n){
  if(!n && n !== 0) return '';
  if(n >= 1000) return (n/1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'k';
  return String(n);
}

function popupHTML(p){
  const meta = CAT_META[p.cat];
  const details = PLACE_META[p.name] || {};
  const q = encodeURIComponent(p.gmaps || (p.name + ' Paris'));
  const t = encodeURIComponent(p.ta   || (p.name + ' Paris'));
  const gmapsURL = `https://www.google.com/maps/search/?api=1&query=${q}`;
  const taURL    = `https://www.tripadvisor.com/Search?q=${t}`;

  // Rating row — only if we have rating data
  const ratingHTML = (details.rating != null) ? `
    <div class="pop-rating">
      <span class="stars">★ ${details.rating.toFixed(1)}</span>
      ${details.reviews != null ? `<span class="reviews">(${formatReviews(details.reviews)} reviews)</span>` : ''}
      <span class="live-hint">approx · tap link for live</span>
    </div>` : '';

  // Address — prefer explicit, otherwise first branch
  const fallbackAddress = (p.branches && p.branches.length === 1) ? p.branches[0] : null;
  const addressText = details.address || fallbackAddress;
  // Hide the address line for places that are areas/walks (no real street address)
  const addressHTML = addressText ? `<div class="pop-address"><span>${addressText}</span></div>` : '';

  // Branches block — only when there are multiple locations
  const branchesHTML = (p.branches && p.branches.length > 1) ? `
    <div class="branches">
      <strong>📍 Locations (${p.branches.length})</strong>
      <ul>${p.branches.map(b=>`<li>${b}</li>`).join('')}</ul>
    </div>` : '';

  return `
    <div class="pop-header">
      <span class="pop-cat">${meta.emoji} ${meta.label}</span>
      <h3 class="pop-title">${p.name}</h3>
    </div>
    <div class="pop-body">
      <p class="pop-desc">${p.desc}</p>
      ${ratingHTML}
      ${addressHTML}
      ${branchesHTML}
      <div class="pop-links">
        <a class="gm" href="${gmapsURL}" target="_blank" rel="noopener">📍 Google Maps</a>
        <a class="ta" href="${taURL}"   target="_blank" rel="noopener">🦉 TripAdvisor</a>
      </div>
    </div>
  `;
}

PLACES.forEach((p, idx)=>{
  const m = L.marker([p.lat, p.lng], { icon: makeIcon(p.cat) })

    .bindPopup(popupHTML(p), { maxWidth: 320, autoPan:true });
  m._place = p;
  m._idx = idx;
  markers.push(m);
});

/* ---------------- FILTERS (multi-select) ---------------- */
// Empty set = show all. Otherwise = union of the selected categories.
const activeCats = new Set();
let activeQuery  = "";

function applyFilters(){
  let visibleCount = 0;
  markers.forEach(m=>{
    const p = m._place;
    const catOk = activeCats.size === 0 || activeCats.has(p.cat);
    const qOk   = !activeQuery || p.name.toLowerCase().includes(activeQuery);
    if(catOk && qOk){
      if(!map.hasLayer(m)) m.addTo(map);
      visibleCount++;
    }else{
      if(map.hasLayer(m)) map.removeLayer(m);
    }
  });
  document.getElementById('count').textContent = visibleCount;
}

function syncCategoryButtons(){
  document.querySelectorAll('.cat-btn').forEach(b=>{
    const c = b.dataset.cat;
    const on = (c === "all") ? activeCats.size === 0 : activeCats.has(c);
    b.classList.toggle('active', on);
    b.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
}

document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const cat = btn.dataset.cat;
    if(cat === "all"){
      // "All Places" clears every selection
      activeCats.clear();
    } else {
      // Toggle this category on or off
      if(activeCats.has(cat)) activeCats.delete(cat);
      else                    activeCats.add(cat);
    }
    syncCategoryButtons();
    applyFilters();
  });
});

/* Hide the right-edge fade hint when the user has scrolled the category bar to the end */
(function setupCategoryFadeHint(){
  const bar = document.getElementById('categoryBar');
  const wrap = bar && bar.parentElement;
  if(!bar || !wrap) return;
  function update(){
    const maxScroll = bar.scrollWidth - bar.clientWidth;
    if(maxScroll <= 2){
      // No overflow at all — hide hint entirely (desktop / wide screens)
      wrap.style.setProperty('--fade-right', '0');
      return;
    }
    const remaining = maxScroll - bar.scrollLeft;
    // Fade out as we approach the end (last ~24 px)
    const opacity = Math.max(0, Math.min(1, remaining / 24));
    wrap.style.setProperty('--fade-right', String(opacity));
  }
  bar.addEventListener('scroll', update, { passive:true });
  window.addEventListener('resize', update);
  update();
})();

/* ---------------- SEARCH with autocomplete ---------------- */
const searchInput = document.getElementById('search');
const suggBox     = document.getElementById('suggestions');
let activeSuggestion = -1;

function renderSuggestions(q){
  const qLower = (q||"").trim().toLowerCase();

  // Build the list of matches (or all places if no query)
  const matches = PLACES
    .map((p,i)=>({p,i}))
    .filter(x => !qLower || x.p.name.toLowerCase().includes(qLower) || CAT_META[x.p.cat].label.toLowerCase().includes(qLower));

  if(!matches.length){
    suggBox.innerHTML = `<div class="sugg-empty">✨ No magical places match — try another word.</div>`;
    suggBox.classList.add('show');
    activeSuggestion = -1;
    return;
  }

  // Group by category for nicer scanning (preserve category order)
  const CAT_ORDER = ["hotel","kids","dining","coffee","attraction"];
  const grouped = {};
  matches.forEach(x => {
    (grouped[x.p.cat] = grouped[x.p.cat] || []).push(x);
  });

  let html = "";
  CAT_ORDER.forEach(cat=>{
    if(!grouped[cat]) return;
    const meta = CAT_META[cat];
    html += `<div class="sugg-group">${meta.emoji} ${meta.label} <span style="opacity:.55;font-weight:600">(${grouped[cat].length})</span></div>`;
    grouped[cat].forEach(x=>{
      const m = CAT_META[x.p.cat];
      const display = qLower ? highlightMatch(x.p.name, qLower) : x.p.name;
      html += `<div class="suggestion" data-idx="${x.i}">
        <span class="pin" style="background:${m.color}">${m.emoji}</span>
        <span>${display}</span>
        <span class="meta">${m.label}</span>
      </div>`;
    });
  });

  suggBox.innerHTML = html;
  suggBox.classList.add('show');
  activeSuggestion = -1;

  suggBox.querySelectorAll('.suggestion').forEach(el=>{
    el.addEventListener('click', ()=>{
      const idx = parseInt(el.dataset.idx,10);
      selectPlace(idx);
    });
  });
}

function highlightMatch(name, q){
  const i = name.toLowerCase().indexOf(q);
  if(i<0) return name;
  return name.slice(0,i) + '<b style="color:var(--dlp-magenta)">' + name.slice(i, i+q.length) + '</b>' + name.slice(i+q.length);
}

function selectPlace(idx){
  const p = PLACES[idx];
  const m = markers[idx];
  // Ensure the chosen place is visible regardless of current filters
  activeCats.clear();
  activeQuery = "";
  syncCategoryButtons();
  searchInput.value = p.name;
  applyFilters();
  map.flyTo([p.lat, p.lng], 15, { duration: 1.1 });
  setTimeout(()=> m.openPopup(), 900);
  suggBox.classList.remove('show');
}

searchInput.addEventListener('input', e=>{
  const v = e.target.value.trim();
  activeQuery = v.toLowerCase();
  renderSuggestions(v);
  applyFilters();
});

// Show the full list as a dropdown whenever the user focuses/clicks the search box
searchInput.addEventListener('focus', ()=>{
  renderSuggestions(searchInput.value);
});
searchInput.addEventListener('click', ()=>{
  renderSuggestions(searchInput.value);
});

searchInput.addEventListener('keydown', e=>{
  const items = suggBox.querySelectorAll('.suggestion[data-idx]');
  if(!items.length) return;
  if(e.key === "ArrowDown"){
    e.preventDefault();
    activeSuggestion = (activeSuggestion+1) % items.length;
    items.forEach(el=>el.classList.remove('active'));
    items[activeSuggestion].classList.add('active');
    items[activeSuggestion].scrollIntoView({block:'nearest'});
  } else if(e.key === "ArrowUp"){
    e.preventDefault();
    activeSuggestion = (activeSuggestion-1+items.length) % items.length;
    items.forEach(el=>el.classList.remove('active'));
    items[activeSuggestion].classList.add('active');
    items[activeSuggestion].scrollIntoView({block:'nearest'});
  } else if(e.key === "Enter"){
    e.preventDefault();
    const target = activeSuggestion >= 0 ? items[activeSuggestion] : items[0];
    if(target){
      selectPlace(parseInt(target.dataset.idx,10));
    }
  } else if(e.key === "Escape"){
    suggBox.classList.remove('show');
    searchInput.blur();
  }
});

document.addEventListener('click', e=>{
  if(!e.target.closest('.search-wrap')) suggBox.classList.remove('show');
});

/* ---------------- LIVE USER LOCATION ---------------- */
const locateBtn = document.getElementById('locateBtn');
const toastEl   = document.getElementById('toast');
let userMarker = null;
let accuracyCircle = null;
let watchId = null;
let firstLocation = true;
let toastTimer = null;

function showToast(msg, ms=3000){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toastEl.classList.remove('show'), ms);
}

function userIcon(){
  return L.divIcon({
    html: '<div class="user-marker"></div>',
    className: '',
    iconSize: [22, 22],
    iconAnchor: [11, 11]
  });
}

function userPopupHTML(lat, lng, accuracy){
  // Find nearest place by straight-line distance
  let nearest = null, best = Infinity;
  PLACES.forEach(p=>{
    const d = haversine(lat, lng, p.lat, p.lng);
    if(d < best){ best = d; nearest = p; }
  });
  const distStr = best < 1 ? Math.round(best*1000) + ' m' : best.toFixed(1) + ' km';
  const accStr  = accuracy ? `±${Math.round(accuracy)} m` : '';
  return `
    <div class="pop-header" style="padding:10px 14px">
      <span class="pop-cat">📍 You are here</span>
      <h3 class="pop-title" style="font-size:15px">Your live location</h3>
    </div>
    <div class="pop-body" style="padding:12px 14px">
      <p class="pop-desc" style="margin-bottom:6px">
        <b>Lat:</b> ${lat.toFixed(5)} &nbsp; <b>Lng:</b> ${lng.toFixed(5)}<br/>
        <span style="opacity:.75">Accuracy ${accStr}</span>
      </p>
      ${nearest ? `<div class="branches" style="margin-top:8px">
        <strong>✨ Nearest place</strong>
        <div style="font-size:13px; color:#333; margin-top:4px">
          <b>${nearest.name}</b> — ${distStr} away
        </div>
      </div>` : ''}
    </div>
  `;
}

// Haversine distance in km
function haversine(lat1, lon1, lat2, lon2){
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function updateUserLocation(pos){
  const { latitude, longitude, accuracy } = pos.coords;

  if(!userMarker){
    userMarker = L.marker([latitude, longitude], {
      icon: userIcon(),
      zIndexOffset: 1000
    }).addTo(map);
    userMarker.bindPopup(userPopupHTML(latitude, longitude, accuracy), { maxWidth: 280 });
  } else {
    userMarker.setLatLng([latitude, longitude]);
    userMarker.setPopupContent(userPopupHTML(latitude, longitude, accuracy));
  }

  if(!accuracyCircle){
    accuracyCircle = L.circle([latitude, longitude], {
      radius: accuracy,
      color: '#E6308A',
      weight: 1,
      opacity: .55,
      fillColor: '#E6308A',
      fillOpacity: .10,
      interactive: false
    }).addTo(map);
  } else {
    accuracyCircle.setLatLng([latitude, longitude]);
    accuracyCircle.setRadius(accuracy);
  }

  if(firstLocation){
    firstLocation = false;
    map.flyTo([latitude, longitude], 15, { duration: 1.2 });
    locateBtn.classList.remove('seeking');
    locateBtn.classList.add('active');
    showToast('✨ Found you! Tap the pin for your live location.');
  }
}

function locationError(err){
  locateBtn.classList.remove('seeking', 'active');
  let msg = '⚠️ Could not get your location.';
  if(err.code === 1) msg = '⛔ Location permission denied. Enable it in your browser settings.';
  else if(err.code === 2) msg = '🛰️ Location unavailable — check your GPS / network.';
  else if(err.code === 3) msg = '⏱️ Location request timed out — try again.';
  showToast(msg, 4500);
}

function startLocating(){
  if(!('geolocation' in navigator)){
    showToast('⚠️ Geolocation is not supported by this browser.', 4000);
    return;
  }
  locateBtn.classList.add('seeking');
  showToast('🛰️ Locating you…', 2000);
  firstLocation = true;

  // watchPosition gives live updates as the user moves
  watchId = navigator.geolocation.watchPosition(updateUserLocation, locationError, {
    enableHighAccuracy: true,
    maximumAge: 5000,
    timeout: 15000
  });
}

function stopLocating(){
  if(watchId != null){
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  if(userMarker){
    map.removeLayer(userMarker);
    userMarker = null;
  }
  if(accuracyCircle){
    map.removeLayer(accuracyCircle);
    accuracyCircle = null;
  }
  locateBtn.classList.remove('seeking', 'active');
  showToast('Live location turned off.', 1800);
}

locateBtn.addEventListener('click', ()=>{
  if(watchId == null){
    // start
    startLocating();
  } else if(userMarker){
    // already tracking — re-center on user (single tap)
    const { lat, lng } = userMarker.getLatLng();
    map.flyTo([lat, lng], Math.max(map.getZoom(), 15), { duration: .9 });
  }
});

// Double-click / long-press to stop
let pressTimer = null;
locateBtn.addEventListener('pointerdown', ()=>{
  pressTimer = setTimeout(()=>{
    if(watchId != null) stopLocating();
  }, 700);
});
locateBtn.addEventListener('pointerup',     ()=> clearTimeout(pressTimer));
locateBtn.addEventListener('pointerleave',  ()=> clearTimeout(pressTimer));
locateBtn.addEventListener('dblclick',      ()=>{ if(watchId != null) stopLocating(); });

/* ---------------- RESPONSIVE: keep map sized to viewport minus header ---------------- */
const headerEl = document.querySelector('header.app');
function syncHeaderHeight(){
  const h = headerEl.getBoundingClientRect().height;
  document.documentElement.style.setProperty('--header-h', h + 'px');
  // Leaflet needs to recalc tile positions after size changes
  if (map) map.invalidateSize();
}
syncHeaderHeight();
window.addEventListener('resize', syncHeaderHeight);
window.addEventListener('orientationchange', ()=> setTimeout(syncHeaderHeight, 200));
// Re-measure once fonts have loaded (Cinzel/Mr Dafoe shift the header height)
if (document.fonts && document.fonts.ready){
  document.fonts.ready.then(syncHeaderHeight);
}
// Watch the header for size changes (e.g. category bar wrapping)
if (window.ResizeObserver){
  new ResizeObserver(syncHeaderHeight).observe(headerEl);
}
</script>
